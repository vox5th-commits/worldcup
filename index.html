<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 월드컵 승부예측 (친구모임)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    
    <style>
        -webkit-tap-highlight-color: transparent;
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans pb-24">
    <header class="sticky top-0 bg-gray-900/90 backdrop-blur border-b border-gray-800 py-4 px-4 z-50">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <h1 class="text-xl font-black text-amber-500 tracking-tight">🏆 2026 월드컵 승부예측 (다른 모임)</h1>
            <button id="musicBtn" onclick="toggleMusic()" class="text-2xl px-2 py-1 bg-gray-800/80 rounded-full border border-gray-700 active:bg-gray-700 transition">🔇</button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-6">

        <section id="tab-predict" class="tab-content space-y-6">
            <div class="bg-gray-900 p-5 rounded-2xl border border-gray-800 shadow-xl">
                <img src="group-photo.jpg" alt="우리 모임 사진" class="w-full aspect-video object-cover rounded-2xl border border-gray-800 mb-5 shadow-lg">
                <h2 class="text-lg font-bold mb-4 text-white flex items-center gap-2">🎲 내 예측 제출하기</h2>
                <form id="predictForm" class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">이름 / 닉네임</label>
                        <select id="userName" required class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500 text-sm appearance-none">
                            <option value="">선택하세요</option>
                            <option value="윤짱짱">윤짱짱</option>
                            <option value="불면숭">불면숭</option>
                            <option value="전라컹컹컹">전라컹컹컹</option>
                            <option value="봉봉치치">봉봉치치</option>
                            <option value="귀여운한주">귀여운한주</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2 flex items-center gap-1">
                            <span>우승국 예측</span>
                            <span id="lockBadge_winner" class="hidden text-[9px] text-red-400 font-bold bg-red-950/80 px-1 rounded border border-red-900/50">마감</span>
                        </label>
                        <input type="text" id="winnerPredict" required class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500 text-sm transition disabled:opacity-40 disabled:cursor-not-allowed" placeholder="우승국을 직접 입력하세요 (예: 브라질)">
                    </div>
                    <div class="space-y-3 pt-2">
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">승무패 예측 (한국 기준)</label>
                        <div class="grid grid-cols-3 gap-2 mb-3">
                            <div>
                                <div class="text-[10px] text-center text-gray-400 mb-0.5 flex items-center justify-center gap-0.5">
                                    <span>vs 체코 (1차전)</span>
                                    <span id="lockBadge_m1" class="hidden text-[9px] text-red-400 font-bold bg-red-950/80 px-1 rounded border border-red-900/50">마감</span>
                                </div>
                                <select id="m1_wdl" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-2 py-2 text-center text-sm focus:outline-none focus:border-amber-500 transition disabled:opacity-40 disabled:cursor-not-allowed">
                                    <option value="">선택</option>
                                    <option value="승">승</option>
                                    <option value="무">무</option>
                                    <option value="패">패</option>
                                </select>
                            </div>
                            <div>
                                <div class="text-[10px] text-center text-gray-400 mb-0.5 flex items-center justify-center gap-0.5">
                                    <span>vs 멕시코 (2차전)</span>
                                    <span id="lockBadge_m2" class="hidden text-[9px] text-red-400 font-bold bg-red-950/80 px-1 rounded border border-red-900/50">마감</span>
                                </div>
                                <select id="m2_wdl" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-2 py-2 text-center text-sm focus:outline-none focus:border-amber-500 transition disabled:opacity-40 disabled:cursor-not-allowed">
                                    <option value="">선택</option>
                                    <option value="승">승</option>
                                    <option value="무">무</option>
                                    <option value="패">패</option>
                                </select>
                            </div>
                            <div>
                                <div class="text-[10px] text-center text-gray-400 mb-0.5 flex items-center justify-center gap-0.5">
                                    <span>vs 남아공 (3차전)</span>
                                    <span id="lockBadge_m3" class="hidden text-[9px] text-red-400 font-bold bg-red-950/80 px-1 rounded border border-red-900/50">마감</span>
                                </div>
                                <select id="m3_wdl" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-2 py-2 text-center text-sm focus:outline-none focus:border-amber-500 transition disabled:opacity-40 disabled:cursor-not-allowed">
                                    <option value="">선택</option>
                                    <option value="승">승</option>
                                    <option value="무">무</option>
                                    <option value="패">패</option>
                                </select>
                            </div>
                        </div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-400">한국 경기 스코어 예측</label>
                        <div class="bg-gray-800/60 p-4 rounded-xl border border-gray-800 flex items-center justify-between gap-2">
                            <div class="w-24 text-center">
                                <span class="text-xs text-gray-400 block font-semibold">6/12 11:00</span>
                                <span class="text-sm font-bold text-white">대한민국 🇰🇷</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="number" inputmode="numeric" id="m1_home" min="0" value="0" class="w-12 h-10 bg-gray-900 text-center rounded-lg font-black text-lg border border-gray-700 transition disabled:opacity-40 disabled:cursor-not-allowed">
                                <span class="text-gray-600 font-bold">:</span>
                                <input type="number" inputmode="numeric" id="m1_away" min="0" value="0" class="w-12 h-10 bg-gray-900 text-center rounded-lg font-black text-lg border border-gray-700 transition disabled:opacity-40 disabled:cursor-not-allowed">
                            </div>
                            <div class="w-24 text-center">
                                <span class="text-xs text-gray-400 block font-semibold">1차전</span>
                                <span class="text-sm font-bold text-white">체코 🇨🇿</span>
                            </div>
                        </div>
                        <div class="bg-gray-800/60 p-4 rounded-xl border border-gray-800 flex items-center justify-between gap-2">
                            <div class="w-24 text-center">
                                <span class="text-xs text-gray-400 block font-semibold">6/19 10:00</span>
                                <span class="text-sm font-bold text-white">멕시코 🇲🇽</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="number" inputmode="numeric" id="m2_home" min="0" value="0" class="w-12 h-10 bg-gray-900 text-center rounded-lg font-black text-lg border border-gray-700 transition disabled:opacity-40 disabled:cursor-not-allowed">
                                <span class="text-gray-600 font-bold">:</span>
                                <input type="number" inputmode="numeric" id="m2_away" min="0" value="0" class="w-12 h-10 bg-gray-900 text-center rounded-lg font-black text-lg border border-gray-700 transition disabled:opacity-40 disabled:cursor-not-allowed">
                            </div>
                            <div class="w-24 text-center">
                                <span class="text-xs text-gray-400 block font-semibold">2차전</span>
                                <span class="text-sm font-bold text-white">대한민국 🇰🇷</span>
                            </div>
                        </div>
                        <div class="bg-gray-800/60 p-4 rounded-xl border border-gray-800 flex items-center justify-between gap-2">
                            <div class="w-24 text-center">
                                <span class="text-xs text-gray-400 block font-semibold">6/25 10:00</span>
                                <span class="text-sm font-bold text-white">남아공 🇿🇦</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="number" inputmode="numeric" id="m3_home" min="0" value="0" class="w-12 h-10 bg-gray-900 text-center rounded-lg font-black text-lg border border-gray-700 transition disabled:opacity-40 disabled:cursor-not-allowed">
                                <span class="text-gray-600 font-bold">:</span>
                                <input type="number" inputmode="numeric" id="m3_away" min="0" value="0" class="w-12 h-10 bg-gray-900 text-center rounded-lg font-black text-lg border border-gray-700 transition disabled:opacity-40 disabled:cursor-not-allowed">
                            </div>
                            <div class="w-24 text-center">
                                <span class="text-xs text-gray-400 block font-semibold">3차전</span>
                                <span class="text-sm font-bold text-white">대한민국 🇰🇷</span>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-amber-500 active:bg-amber-600 text-gray-950 font-black py-4 rounded-xl transition text-base shadow-lg shadow-amber-500/20 mt-4">
                        저장하기 (실시간 반영)
                    </button>
                </form>
            </div>
        </section>

        <section id="tab-board" class="tab-content space-y-4 hidden">
            <div class="flex items-center justify-between mb-2">
                <h2 class="text-lg font-bold text-white">📊 실시간 랭킹 & 현황</h2>
                <span class="text-xs text-gray-400 font-medium">*스코어 정확 3점 + 승무패 적중 +1점 (경기당 최대 4점)</span>
            </div>
            <div id="cardContainer" class="space-y-3"></div>
        </section>

        <section id="tab-admin" class="tab-content space-y-6 hidden">
            <div class="bg-gray-900 p-5 rounded-2xl border border-gray-800 shadow-xl space-y-5">
                <h2 class="text-lg font-bold text-white border-b border-gray-800 pb-2">⚙️ 총무 관리자 메뉴</h2>
                
                <div class="space-y-4">
                    <div class="bg-gray-800/40 p-3 rounded-xl border border-gray-800/80 space-y-2">
                        <label class="block text-xs font-bold text-gray-400">1차전 결과 (체코전)</label>
                        <div class="flex gap-2">
                            <input type="text" id="res_m1" placeholder="예시) 2:1" class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-center font-black text-amber-400">
                            <button type="button" onclick="toggleLock('m1')" id="lockBtn_m1" class="px-3 rounded-xl font-bold text-xs transition bg-gray-800 border border-gray-700 text-gray-300 whitespace-nowrap">🔒 마감하기</button>
                        </div>
                    </div>
                    
                    <div class="bg-gray-800/40 p-3 rounded-xl border border-gray-800/80 space-y-2">
                        <label class="block text-xs font-bold text-gray-400">2차전 결과 (멕시코전)</label>
                        <div class="flex gap-2">
                            <input type="text" id="res_m2" placeholder="예시) 1:1" class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-center font-black text-amber-400">
                            <button type="button" onclick="toggleLock('m2')" id="lockBtn_m2" class="px-3 rounded-xl font-bold text-xs transition bg-gray-800 border border-gray-700 text-gray-300 whitespace-nowrap">🔒 마감하기</button>
                        </div>
                    </div>
                    
                    <div class="bg-gray-800/40 p-3 rounded-xl border border-gray-800/80 space-y-2">
                        <label class="block text-xs font-bold text-gray-400">3차전 결과 (남아공전)</label>
                        <div class="flex gap-2">
                            <input type="text" id="res_m3" placeholder="예시) 0:2" class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-center font-black text-amber-400">
                            <button type="button" onclick="toggleLock('m3')" id="lockBtn_m3" class="px-3 rounded-xl font-bold text-xs transition bg-gray-800 border border-gray-700 text-gray-300 whitespace-nowrap">🔒 마감하기</button>
                        </div>
                    </div>

                    <div class="bg-gray-800/40 p-3 rounded-xl border border-gray-800/80 space-y-2">
                        <label class="block text-xs font-bold text-gray-400">최종 우승국 결과</label>
                        <div class="flex gap-2">
                            <input type="text" id="res_winner" placeholder="예시) 브라질" class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-center font-black text-amber-400">
                            <button type="button" onclick="toggleLock('winner')" id="lockBtn_winner" class="px-3 rounded-xl font-bold text-xs transition bg-gray-800 border border-gray-700 text-gray-300 whitespace-nowrap">🔒 마감하기</button>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button onclick="applyResults()" class="bg-emerald-600 active:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl text-sm shadow-md shadow-emerald-600/10">
                        결과 반영/정산
                    </button>
                    <button onclick="clearAllPredictions()" class="bg-red-600 active:bg-red-700 text-white font-bold py-3 px-4 rounded-xl text-sm">
                        전체 예측 초기화
                    </button>
                </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-gray-900 border-t border-gray-800 px-6 py-2 flex justify-around items-center z-50 shadow-2xl max-w-md mx-auto">
        <button onclick="switchTab('predict')" id="btn-predict" class="flex flex-col items-center gap-1 py-1 text-amber-500 font-bold text-xs transition">
            <span class="text-xl">🎲</span>
            <span>예측하기</span>
        </button>
        <button onclick="switchTab('board')" id="btn-board" class="flex flex-col items-center gap-1 py-1 text-gray-500 font-medium text-xs transition">
            <span class="text-xl">📊</span>
            <span>현황판</span>
        </button>
        <button onclick="switchTab('admin')" id="btn-admin" class="flex flex-col items-center gap-1 py-1 text-gray-500 font-medium text-xs transition">
            <span class="text-xl">⚙️</span>
            <span>결과입력</span>
        </button>
    </nav>

    <audio id="bgMusic" loop>
        <source src="worldcup-bgm.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ==================== Firebase 설정 ====================
        const firebaseConfig = {
            apiKey: "AIzaSyDdNxvJyGgNuMOrfYhT-AitGfR4S-cFuG0",
            authDomain: "world-6bc8a.firebaseapp.com",
            databaseURL: "https://world-6bc8a-default-rtdb.firebaseio.com",
            projectId: "world-6bc8a",
            storageBucket: "world-6bc8a.firebasestorage.app",
            messagingSenderId: "61012586500",
            appId: "1:61012586500:web:53661df572df5a6b010551"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const predictionsRef = db.ref('worldcup_predictions');
        const adminRef = db.ref('worldcup_admin');

        const ADMIN_PASSWORD = "1234";

        let participants = [];
        let realResults = { m1: '', m2: '', m3: '', winner: '', m1_locked: false, m2_locked: false, m3_locked: false, winner_locked: false };

        // ==================== 실시간 데이터 수신 및 동기화 ====================
        predictionsRef.on('value', (snapshot) => {
            participants = [];
            if (snapshot.exists()) {
                snapshot.forEach((child) => {
                    participants.push(child.val());
                });
            }
            renderCards();
        });

        adminRef.on('value', (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                realResults.m1 = data.m1 || '';
                realResults.m2 = data.m2 || '';
                realResults.m3 = data.m3 || '';
                realResults.winner = data.winner || '';
                realResults.m1_locked = data.m1_locked || false;
                realResults.m2_locked = data.m2_locked || false;
                realResults.m3_locked = data.m3_locked || false;
                realResults.winner_locked = data.winner_locked || false;
            }
            
            const m1 = document.getElementById('res_m1');
            const m2 = document.getElementById('res_m2');
            const m3 = document.getElementById('res_m3');
            const winner = document.getElementById('res_winner');
            if (m1) m1.value = realResults.m1;
            if (m2) m2.value = realResults.m2;
            if (m3) m3.value = realResults.m3;
            if (winner) winner.value = realResults.winner;

            updateAdminLockButtons();
            updatePredictFormLockStates();
            renderCards();
        });

        document.getElementById('userName').addEventListener('change', function() {
            const selectedName = this.value;
            const p = participants.find(item => item.name === selectedName);
            
            if (p) {
                document.getElementById('winnerPredict').value = p.winner || '';
                document.getElementById('m1_wdl').value = p.m1_wdl || '';
                document.getElementById('m2_wdl').value = p.m2_wdl || '';
                document.getElementById('m3_wdl').value = p.m3_wdl || '';
                document.getElementById('m1_home').value = p.m1_home !== undefined ? p.m1_home : 0;
                document.getElementById('m1_away').value = p.m1_away !== undefined ? p.m1_away : 0;
                document.getElementById('m2_home').value = p.m2_home !== undefined ? p.m2_home : 0;
                document.getElementById('m2_away').value = p.m2_away !== undefined ? p.m2_away : 0;
                document.getElementById('m3_home').value = p.m3_home !== undefined ? p.m3_home : 0;
                document.getElementById('m3_away').value = p.m3_away !== undefined ? p.m3_away : 0;
            } else {
                document.getElementById('winnerPredict').value = '';
                document.getElementById('m1_wdl').value = '';
                document.getElementById('m2_wdl').value = '';
                document.getElementById('m3_wdl').value = '';
                document.getElementById('m1_home').value = 0;
                document.getElementById('m1_away').value = 0;
                document.getElementById('m2_home').value = 0;
                document.getElementById('m2_away').value = 0;
                document.getElementById('m3_home').value = 0;
                document.getElementById('m3_away').value = 0;
            }
        });

        function updateAdminLockButtons() {
            ['m1', 'm2', 'm3', 'winner'].forEach(m => {
                const btn = document.getElementById(`lockBtn_${m}`);
                if (!btn) return;
                const isLocked = realResults[`${m}_locked`] || false;
                if (isLocked) {
                    btn.textContent = '🔓 마감해제';
                    btn.className = "px-3 rounded-xl font-bold text-xs transition bg-red-600 active:bg-red-700 text-white whitespace-nowrap shadow-md shadow-red-600/10";
                } else {
                    btn.textContent = '🔒 마감하기';
                    btn.className = "px-3 rounded-xl font-bold text-xs transition bg-gray-800 border border-gray-700 active:bg-gray-700 text-gray-300 whitespace-nowrap";
                }
            });
        }

        function updatePredictFormLockStates() {
            // 경기별 마감 상태 연동
            ['m1', 'm2', 'm3'].forEach(m => {
                const isLocked = realResults[`${m}_locked`] || false;
                const wdl = document.getElementById(`${m}_wdl`);
                const home = document.getElementById(`${m}_home`);
                const away = document.getElementById(`${m}_away`);
                const badge = document.getElementById(`lockBadge_${m}`);

                if (wdl) wdl.disabled = isLocked;
                if (home) home.disabled = isLocked;
                if (away) away.disabled = isLocked;

                if (badge) {
                    if (isLocked) badge.classList.remove('hidden');
                    else badge.classList.add('hidden');
                }
            });

            // 최종 우승국 마감 상태 연동
            const isWinnerLocked = realResults.winner_locked || false;
            const winnerPredict = document.getElementById('winnerPredict');
            const badgeWinner = document.getElementById('lockBadge_winner');
            
            if (winnerPredict) winnerPredict.disabled = isWinnerLocked;
            if (badgeWinner) {
                if (isWinnerLocked) badgeWinner.classList.remove('hidden');
                else badgeWinner.classList.add('hidden');
            }
        }

        function toggleLock(matchKey) {
            const password = prompt("관리자 비밀번호 4자리를 입력하세요:");
            if (password !== ADMIN_PASSWORD) {
                alert("비밀번호가 올바르지 않습니다.");
                return;
            }
            const currentStatus = realResults[`${matchKey}_locked`] || false;
            const updates = {};
            updates[`${matchKey}_locked`] = !currentStatus;
            
            adminRef.update(updates)
                .then(() => {
                    alert('마감 상태가 변경되어 클라우드에 즉시 공유되었습니다.');
                })
                .catch(err => alert('상태 변경 실패: ' + err.message));
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            const tabs = ['predict', 'board', 'admin'];
            tabs.forEach(t => {
                const btn = document.getElementById(`btn-${t}`);
                if (t === tabId) {
                    btn.classList.add('text-amber-500', 'font-bold');
                    btn.classList.remove('text-gray-500', 'font-medium');
                } else {
                    btn.classList.remove('text-amber-500', 'font-bold');
                    btn.classList.add('text-gray-500', 'font-medium');
                }
            });
            if (tabId === 'board') renderCards();
        }

        function getWDL(homeScore, awayScore) {
            if (homeScore > awayScore) return 'W';
            if (homeScore < awayScore) return 'L';
            return 'D';
        }

        function calculateScore(p) {
            let score = 0;

            if (realResults.m1) {
                const [rHome, rAway] = realResults.m1.split(':').map(Number);
                const isExact1 = (p.m1_home === rHome && p.m1_away === rAway);
                const realWDL1 = rHome > rAway ? '승' : (rHome === rAway ? '무' : '패');
                const isWDL1 = (p.m1_wdl === realWDL1);

                if (isExact1) score += 3;
                if (isWDL1) score += 1;
            }

            if (realResults.m2) {
                const [rHome, rAway] = realResults.m2.split(':').map(Number);
                const isExact2 = (p.m2_home === rHome && p.m2_away === rAway);
                const realWDL2 = rAway > rHome ? '승' : (rAway === rHome ? '무' : '패');
                const isWDL2 = (p.m2_wdl === realWDL2);

                if (isExact2) score += 3;
                if (isWDL2) score += 1;
            }

            if (realResults.m3) {
                const [rHome, rAway] = realResults.m3.split(':').map(Number);
                const isExact3 = (p.m3_home === rHome && p.m3_away === rAway);
                const realWDL3 = rAway > rHome ? '승' : (rAway === rHome ? '무' : '패');
                const isWDL3 = (p.m3_wdl === realWDL3);

                if (isExact3) score += 3;
                if (isWDL3) score += 1;
            }

            return score;
        }

        function renderCards() {
            const container = document.getElementById('cardContainer');
            if (!container) return;
            container.innerHTML = '';
            const sorted = [...participants].map(p => ({...p, totalScore: calculateScore(p)}))
                                           .sort((a, b) => b.totalScore - a.totalScore);
            if (sorted.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-gray-500 text-sm">아직 등록된 예측이 없습니다.<br>첫 번째 예측을 등록해보세요!</div>`;
                return;
            }

            const wdlColor = (wdl) => wdl === '승' ? 'text-emerald-400' : wdl === '무' ? 'text-yellow-400' : 'text-red-400';

            sorted.forEach((p, index) => {
                const card = document.createElement('div');
                card.className = "bg-gray-900 p-4 rounded-xl border border-gray-800 shadow-md flex items-center justify-between";
                
                let rankBadge = `<span class="text-xs font-bold text-gray-500 mr-2">${index + 1}위</span>`;
                if(index === 0) rankBadge = `<span class="text-sm mr-2">🥇</span>`;
                if(index === 1) rankBadge = `<span class="text-sm mr-2">🥈</span>`;
                if(index === 2) rankBadge = `<span class="text-sm mr-2">🥉</span>`;
                card.innerHTML = `
                    <div class="space-y-1">
                        <div class="flex items-center">
                            ${rankBadge}
                            <span class="font-black text-white text-base">${p.name}</span>
                            <span class="text-xs bg-gray-800 text-amber-400 px-2 py-0.5 rounded-full ml-2 font-medium">${p.winner} 👑</span>
                        </div>
                        <div class="text-xs text-gray-400 flex flex-wrap gap-x-2 gap-y-1 pt-1">
                            <span>체코전 <span class="font-bold ${wdlColor(p.m1_wdl)}">[${p.m1_wdl || '미선택'}]</span> <b class="text-gray-200">${p.m1_home}:${p.m1_away}</b></span>
                            <span class="text-gray-700">|</span>
                            <span>멕시코전 <span class="font-bold ${wdlColor(p.m2_wdl)}">[${p.m2_wdl || '미선택'}]</span> <b class="text-gray-200">${p.m2_home}:${p.m2_away}</b></span>
                            <span class="text-gray-700">|</span>
                            <span>남아공전 <span class="font-bold ${wdlColor(p.m3_wdl)}">[${p.m3_wdl || '미선택'}]</span> <b class="text-gray-200">${p.m3_home}:${p.m3_away}</b></span>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-xl font-black text-amber-400">${p.totalScore}<span class="text-xs font-bold text-gray-400 ml-0.5">점</span></div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('predictForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('userName').value.trim();
            const existing = participants.find(p => p.name === name) || {};

            const newData = {
                name: name,
                winner: realResults.winner_locked ? (existing.winner || '') : document.getElementById('winnerPredict').value,
                m1_wdl: realResults.m1_locked ? (existing.m1_wdl || '') : document.getElementById('m1_wdl').value,
                m2_wdl: realResults.m2_locked ? (existing.m2_wdl || '') : document.getElementById('m2_wdl').value,
                m3_wdl: realResults.m3_locked ? (existing.m3_wdl || '') : document.getElementById('m3_wdl').value,
                m1_home: realResults.m1_locked ? (existing.m1_home !== undefined ? existing.m1_home : 0) : Number(document.getElementById('m1_home').value),
                m1_away: realResults.m1_locked ? (existing.m1_away !== undefined ? existing.m1_away : 0) : Number(document.getElementById('m1_away').value),
                m2_home: realResults.m2_locked ? (existing.m2_home !== undefined ? existing.m2_home : 0) : Number(document.getElementById('m2_home').value),
                m2_away: realResults.m2_locked ? (existing.m2_away !== undefined ? existing.m2_away : 0) : Number(document.getElementById('m2_away').value),
                m3_home: realResults.m3_locked ? (existing.m3_home !== undefined ? existing.m3_home : 0) : Number(document.getElementById('m3_home').value),
                m3_away: realResults.m3_locked ? (existing.m3_away !== undefined ? existing.m3_away : 0) : Number(document.getElementById('m3_away').value),
                timestamp: Date.now()
            };

            predictionsRef.child(newData.name).set(newData)
                .then(() => {
                    alert(`[${newData.name}]님 예측이 실시간으로 저장되었습니다!`);
                    switchTab('board');
                })
                .catch((error) => {
                    alert('저장 실패: ' + error.message);
                });
        });

        function applyResults() {
            const password = prompt("관리자 비밀번호 4자리를 입력하세요:");
            if (password !== ADMIN_PASSWORD) {
                alert("비밀번호가 올바르지 않습니다.");
                return;
            }

            const updatedResults = {
                m1: document.getElementById('res_m1').value.trim(),
                m2: document.getElementById('res_m2').value.trim(),
                m3: document.getElementById('res_m3').value.trim(),
                winner: document.getElementById('res_winner').value.trim(),
                m1_locked: realResults.m1_locked || false,
                m2_locked: realResults.m2_locked || false,
                m3_locked: realResults.m3_locked || false,
                winner_locked: realResults.winner_locked || false
            };

            adminRef.set(updatedResults)
                .then(() => {
                    alert('실제 경기 결과가 클라우드 데이터베이스에 정상 배포되었습니다!');
                    renderCards();
                })
                .catch(err => alert('결과 반영 실패: ' + err.message));
        }

        function clearAllPredictions() {
            const password = prompt("관리자 비밀번호 4자리를 입력하세요:");
            if (password !== ADMIN_PASSWORD) {
                alert("비밀번호가 올바르지 않습니다.");
                return;
            }
            if (!confirm('정말 모든 예측을 삭제하시겠습니까?')) return;
            predictionsRef.remove()
                .then(() => {
                    alert('모든 예측이 삭제되었습니다.');
                    participants = [];
                    renderCards();
                })
                .catch(err => alert('삭제 실패: ' + err.message));
        }

        // ==================== 음악 기능 ====================
        let isMusicPlaying = true;
        const audio = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');

        function tryPlayMusic() {
            if (!audio) return;
            audio.play().then(() => {
                if (musicBtn) musicBtn.textContent = '🔇';
                isMusicPlaying = true;
            }).catch(() => {
                console.log("Autoplay prevented. Waiting for user interaction.");
            });
        }

        function toggleMusic() {
            if (!audio || !musicBtn) return;
            if (isMusicPlaying) {
                audio.pause();
                musicBtn.textContent = '🎵';
                isMusicPlaying = false;
            } else {
                audio.play().then(() => {
                    musicBtn.textContent = '🔇';
                    isMusicPlaying = true;
                }).catch(() => {
                    alert('재생할 수 없습니다. 화면을 터치한 후 다시 시도해 주세요.');
                });
            }
        }

        window.addEventListener('load', () => {
            tryPlayMusic();

            const startAudioOnInteraction = () => {
                if (isMusicPlaying && audio && audio.paused) {
                    tryPlayMusic();
                }
                document.removeEventListener('click', startAudioOnInteraction);
                document.removeEventListener('touchstart', startAudioOnInteraction);
            };
            document.addEventListener('click', startAudioOnInteraction);
            document.addEventListener('touchstart', startAudioOnInteraction);
        });
    </script>
</body>
</html>
